<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <!-- Cortical particles — denser, darker -->
    <linearGradient id="cortical" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <!-- Cancellous particles — lighter, more porous feel -->
    <linearGradient id="cancellous" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- 70% cortical particles (darker, 7 pieces) -->
  <ellipse cx="310" cy="340" rx="40" ry="23" fill="url(#cortical)" opacity="0.88" transform="rotate(-28 310 340)"/>
  <ellipse cx="430" cy="295" rx="35" ry="20" fill="url(#cortical)" opacity="0.82" transform="rotate(18 430 295)"/>
  <ellipse cx="390" cy="425" rx="44" ry="25" fill="url(#cortical)" opacity="0.85" transform="rotate(50 390 425)"/>
  <ellipse cx="500" cy="380" rx="30" ry="17" fill="url(#cortical)" opacity="0.78" transform="rotate(-15 500 380)"/>
  <ellipse cx="265" cy="400" rx="28" ry="16" fill="url(#cortical)" opacity="0.75" transform="rotate(30 265 400)"/>
  <ellipse cx="520" cy="450" rx="32" ry="18" fill="url(#cortical)" opacity="0.80" transform="rotate(-40 520 450)"/>
  <ellipse cx="460" cy="470" rx="37" ry="21" fill="url(#cortical)" opacity="0.76" transform="rotate(65 460 470)"/>

  <!-- 30% cancellous particles (lighter, 3 pieces) -->
  <ellipse cx="350" cy="480" rx="33" ry="19" fill="url(#cancellous)" opacity="0.72" transform="rotate(-55 350 480)"/>
  <ellipse cx="290" cy="465" rx="26" ry="15" fill="url(#cancellous)" opacity="0.68" transform="rotate(20 290 465)"/>
  <ellipse cx="480" cy="320" rx="29" ry="16" fill="url(#cancellous)" opacity="0.70" transform="rotate(-22 480 320)"/>

  <!-- Subtle inner detail lines on two cortical particles to suggest density -->
  <line x1="295" y1="336" x2="325" y2="344" stroke="#475569" stroke-width="0.8" opacity="0.30" transform="rotate(-28 310 340)"/>
  <line x1="415" y1="291" x2="445" y2="299" stroke="#475569" stroke-width="0.8" opacity="0.25" transform="rotate(18 430 295)"/>

  <!-- Composition legend bar — visual cue for 70/30 split -->
  <rect x="290" y="545" width="140" height="8" rx="4" fill="url(#cortical)" opacity="0.70"/>
  <rect x="430" y="545" width="60" height="8" rx="4" fill="url(#cancellous)" opacity="0.70"/>
  <text x="360" y="565" font-family="Arial,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">70% Cortical</text>
  <text x="460" y="565" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">30% Cancellous</text>

  <!-- Labels -->
  <text x="400" y="225" font-family="Georgia,serif" font-size="28" fill="#475569" text-anchor="middle" font-style="italic">Bone Us Allo</text>
  <text x="400" y="263" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Allograft Particulate · 70/30 Cortical-Cancellous</text>
  <text x="400" y="590" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Gamma Irradiation · 0.35–1.1 cc · Balanced remodeling</text>
</svg>
