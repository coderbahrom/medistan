<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <radialGradient id="sphere" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="60%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Bovine granule cluster -->
  <circle cx="370" cy="370" r="55" fill="url(#sphere)" stroke="#94a3b8" stroke-width="1.5" opacity="0.9"/>
  <circle cx="450" cy="350" r="42" fill="url(#sphere)" stroke="#94a3b8" stroke-width="1.5" opacity="0.8"/>
  <circle cx="410" cy="450" r="48" fill="url(#sphere)" stroke="#94a3b8" stroke-width="1.5" opacity="0.85"/>
  <circle cx="310" cy="430" r="38" fill="url(#sphere)" stroke="#94a3b8" stroke-width="1.5" opacity="0.75"/>
  <circle cx="490" cy="420" r="34" fill="url(#sphere)" stroke="#94a3b8" stroke-width="1.5" opacity="0.70"/>
  <circle cx="340" cy="320" r="32" fill="url(#sphere)" stroke="#94a3b8" stroke-width="1.5" opacity="0.72"/>
  <!-- Porosity dots on largest granule -->
  <circle cx="355" cy="360" r="4" fill="#94a3b8" opacity="0.4"/>
  <circle cx="375" cy="345" r="3" fill="#94a3b8" opacity="0.35"/>
  <circle cx="390" cy="380" r="5" fill="#94a3b8" opacity="0.4"/>
