  <text x="400" y="273" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Bovine Xenograft · Anorganic Bovine Mineral</text>
  <text x="400" y="560" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">70–80% Interconnected Porosity · Permanent Scaffold</text>
