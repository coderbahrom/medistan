<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="40%" stop-color="#e2e8f0"/>
      <stop offset="60%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Syringe body -->
  <rect x="260" y="340" width="280" height="90" rx="12" fill="url(#barrel)" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Plunger rod -->
  <rect x="220" y="373" width="55" height="24" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <!-- Plunger flange -->
  <rect x="210" y="360" width="20" height="50" rx="4" fill="#94a3b8"/>
  <!-- Tip -->
  <path d="M540 360 L570 385 L540 410 Z" fill="#94a3b8"/>
  <!-- Scale markings -->
  <line x1="300" y1="340" x2="300" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="340" y1="340" x2="340" y2="333" stroke="#94a3b8" stroke-width="1"/>
  <line x1="380" y1="340" x2="380" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="420" y1="340" x2="420" y2="333" stroke="#94a3b8" stroke-width="1"/>
  <line x1="460" y1="340" x2="460" y2="330" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="500" y1="340" x2="500" y2="333" stroke="#94a3b8" stroke-width="1"/>
  <!-- Labels -->
  <text x="400" y="240" font-family="Georgia,serif" font-size="28" fill="#475569" text-anchor="middle" font-style="italic">Do Bone™</text>
  <text x="400" y="278" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Allograft Syringe · 70/30 Cortical-Cancellous</text>
  <text x="400" y="530" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Pre-filled Syringe · 0.25–2.0 cc · 4–6 mo remodeling</text>
</svg>
