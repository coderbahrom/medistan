  <text x="400" y="278" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Allograft Particulate · 80/20 Cortical-Cancellous</text>
  <text x="400" y="570" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">0.25–1.0 mm · Gamma Irradiation · 3–4 mo remodeling</text>
