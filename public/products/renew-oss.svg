<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="particle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Scattered bone particulate visualization -->
  <ellipse cx="320" cy="350" rx="38" ry="22" fill="url(#particle)" opacity="0.85" transform="rotate(-30 320 350)"/>
  <ellipse cx="420" cy="300" rx="32" ry="18" fill="url(#particle)" opacity="0.75" transform="rotate(15 420 300)"/>
  <ellipse cx="380" cy="430" rx="42" ry="24" fill="url(#particle)" opacity="0.80" transform="rotate(45 380 430)"/>
  <ellipse cx="460" cy="390" rx="28" ry="16" fill="url(#particle)" opacity="0.70" transform="rotate(-20 460 390)"/>
  <ellipse cx="340" cy="470" rx="36" ry="20" fill="url(#particle)" opacity="0.75" transform="rotate(60 340 470)"/>
  <ellipse cx="490" cy="460" rx="30" ry="17" fill="url(#particle)" opacity="0.65" transform="rotate(-45 490 460)"/>
  <ellipse cx="270" cy="410" rx="26" ry="15" fill="url(#particle)" opacity="0.70" transform="rotate(25 270 410)"/>
  <ellipse cx="510" cy="330" rx="34" ry="19" fill="url(#particle)" opacity="0.72" transform="rotate(-10 510 330)"/>
