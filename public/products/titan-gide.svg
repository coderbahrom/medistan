  <line x1="225" y1="371" x2="575" y2="371" stroke="#94a3b8" stroke-width="0.6" opacity="0.4"/>
  <line x1="225" y1="384" x2="575" y2="384" stroke="#94a3b8" stroke-width="0.9" opacity="0.5"/>
  <line x1="225" y1="397" x2="575" y2="397" stroke="#94a3b8" stroke-width="0.6" opacity="0.4"/>
  <line x1="225" y1="410" x2="575" y2="410" stroke="#94a3b8" stroke-width="0.9" opacity="0.5"/>
  <line x1="225" y1="423" x2="575" y2="423" stroke="#94a3b8" stroke-width="0.6" opacity="0.4"/>
  <line x1="225" y1="436" x2="575" y2="436" stroke="#94a3b8" stroke-width="0.9" opacity="0.5"/>
  <line x1="225" y1="449" x2="575" y2="449" stroke="#94a3b8" stroke-width="0.6" opacity="0.4"/>
  <line x1="225" y1="462" x2="575" y2="462" stroke="#94a3b8" stroke-width="0.9" opacity="0.5"/>
  <line x1="225" y1="475" x2="575" y2="475" stroke="#94a3b8" stroke-width="0.6" opacity="0.4"/>
  <!-- Cross-fiber diagonal lines for multi-directional effect -->
  <line x1="240" y1="315" x2="260" y2="495" stroke="#94a3b8" stroke-width="0.5" opacity="0.25"/>
  <line x1="320" y1="315" x2="340" y2="495" stroke="#94a3b8" stroke-width="0.5" opacity="0.25"/>
