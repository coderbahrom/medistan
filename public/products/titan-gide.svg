  <!-- Labels -->
  <text x="400" y="237" font-family="Georgia,serif" font-size="28" fill="#475569" text-anchor="middle" font-style="italic">Titan Gide®</text>
  <text x="400" y="275" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Resorbable Pericardium Membrane · Bovine Pericardium</text>
  <text x="400" y="558" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">4–6 mo extended barrier · High tear resistance · Zero-memory</text>
