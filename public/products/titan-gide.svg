<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="membrane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="40%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#b0bec5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Dense pericardium sheet — slightly thicker/flatter than Diaderm -->
  <rect x="215" y="310" width="370" height="190" rx="6" fill="url(#membrane)" stroke="#94a3b8" stroke-width="2"/>
  <!-- Multi-directional dense fiber texture -->
  <line x1="225" y1="330" x2="575" y2="330" stroke="#94a3b8" stroke-width="0.9" opacity="0.5"/>
